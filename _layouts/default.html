<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title and page.title != site.name %}{{ page.title }} - {% endif %}{{ site.name }} - {{ site.description }}</title>
    {% include meta.html %}
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  </head>

  <body>
    <canvas class="living-grid" aria-hidden="true"></canvas>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="site-shell">
      <header class="site-header" aria-label="Site header">
        <a class="brand" href="{{ site.baseurl }}/" aria-label="{{ site.name }} home">KW</a>
        <nav class="site-nav" aria-label="Primary">
          {% for link in site.links %}
            <a href="{{ link.url }}">{{ link.label }}</a>
          {% endfor %}
        </nav>
      </header>

      <main id="main" role="main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>{{ site.name }}</p>
        <nav aria-label="Footer">
          {% for link in site.links %}
            <a href="{{ link.url }}">{{ link.label }}</a>
          {% endfor %}
        </nav>
      </footer>
    </div>

    <script src="{{ site.baseurl }}/living-grid.js" defer></script>
  </body>
</html>
